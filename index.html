<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGUYEN MAI TRANG | Portfolio v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf7; --primary: #d4a373; --accent: #e5989b; --petal: #ffb7c5; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; overflow-x: hidden; }

        /* --- HOA RƠI --- */
        .petal { width: 12px; height: 12px; background: var(--petal); border-radius: 100% 0 100% 0; position: fixed; top: -20px; z-index: 0; animation: fall linear infinite; }
        @keyframes fall {
            0% { top: -20px; transform: rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { top: 100vh; transform: translateX(100px) rotate(720deg); opacity: 0; }
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 7s; }
        .petal:nth-child(2) { left: 40%; animation-duration: 10s; animation-delay: 2s; }
        .petal:nth-child(3) { left: 70%; animation-duration: 8s; animation-delay: 4s; }

        /* --- HIỆU ỨNG NHẢY MẠNH (BOUNCE) --- */
        .card { 
            background: white; padding: 30px; border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            position: relative; z-index: 1;
            /* Hiệu ứng nhảy khi lướt qua */
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        }

        /* KHI DI CHUỘT VÀO: NHẢY LÊN MẠNH */
        .card:hover { 
            transform: translateY(-20px) scale(1.05); 
            box-shadow: 0 25px 50px rgba(229, 152, 155, 0.3);
            border-color: var(--accent);
        }

        /* HIỆU ỨNG NHẢY TỰ ĐỘNG KHI VỪA VÀO TRANG */
        .card { animation: entrance 1s ease-out; }
        @keyframes entrance {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3em; color: var(--primary); text-align: center; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; }
        .research-box { background: #fefae0; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="container" style="max-width: 800px; margin: auto;">
        <header>
            <h1>NGUYEN MAI TRANG</h1>
            <p style="text-align: center; font-style: italic; color: var(--accent);">✨ Aspiring Financial Analyst | FTU Student</p>
        </header>

        <section class="card">
            <h2>✨ ABOUT ME</h2>
            <p>Second-year student at <b>Foreign Trade University</b>. Analytical, resilient, and passionate about Finance.</p>
        </section>

        <section class="card">
            <h2>🔬 SCIENTIFIC RESEARCH</h2>
            <div class="research-box">
                <p><b>Member</b> - Blockchain in ESG Reporting Transparency.</p>
            </div>
        </section>

        <section class="card" style="text-align: center;">
            <p>📫 <a href="mailto:trangnguyen14112006@gmail.com" style="color: var(--accent); text-decoration: none;">trangnguyen14112006@gmail.com</a> | 📞 0372129062</p>
        </section>
    </div>
</body>
</html>
